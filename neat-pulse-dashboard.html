<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Neat Pulse Sensor Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg:#0a0e17;--surface:#111827;--surface2:#1a2234;--border:#1e2d45;
      --accent:#00d4ff;--accent2:#ff6b35;--accent3:#7c3aed;
      --text:#e2e8f0;--text-muted:#64748b;--success:#10b981;--danger:#ef4444;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans JP','Noto Sans KR','Noto Sans SC','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .wrap{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:24px}

    /* ヘッダー */
    header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
    .logo{display:flex;align-items:center;gap:12px}
    .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 18px rgba(0,212,255,.3)}
    .logo-text h1{font-size:1.3rem;font-weight:700}
    .logo-text p{font-size:.72rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;margin-top:2px}

    /* 右上エリア */
    .hdr-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .status{display:flex;align-items:center;gap:7px;font-size:.8rem;font-family:'JetBrains Mono',monospace;color:var(--text-muted)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
    .dot.on{background:var(--success);box-shadow:0 0 7px var(--success);animation:blink 2s infinite}
    .dot.err{background:var(--danger)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

    /* 言語切替ボタン */
    .lang-switcher{display:flex;gap:4px;flex-wrap:wrap}
    .lang-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:.75rem;cursor:pointer;transition:all .18s;font-family:'JetBrains Mono',monospace;white-space:nowrap}
    .lang-btn:hover{border-color:var(--accent);color:var(--text)}
    .lang-btn.active{background:rgba(0,212,255,.15);border-color:var(--accent);color:var(--accent);font-weight:600}

    /* バナー */
    .banner{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.18);border-radius:12px;padding:14px 18px;margin-bottom:18px;font-size:.83rem;line-height:1.8}
    .banner strong{color:var(--accent)}
    .banner code{background:var(--surface2);padding:1px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;color:#fbbf24;font-size:.88em}
    .pstt{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:5px 13px;border-radius:8px;font-size:.78rem;font-family:'JetBrains Mono',monospace}
    .pstt.ok{background:rgba(16,185,129,.13);color:var(--success)}
    .pstt.ng{background:rgba(239,68,68,.13);color:#fca5a5}
    .pstt.waiting{background:rgba(100,116,139,.13);color:var(--text-muted)}

    /* アラート */
    #alert-area .alert{padding:12px 16px;border-radius:10px;font-size:.83rem;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.6}
    .a-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
    .a-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
    .a-inf{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.2);color:#67e8f9}

    /* デバッグ */
    #debug-area{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:#8b949e;margin-bottom:14px;max-height:160px;overflow-y:auto;display:none}
    #debug-area.show{display:block}
    #debug-area .dline{padding:1px 0;border-bottom:1px solid #21262d}
    #debug-area .dline.ok{color:#3fb950}
    #debug-area .dline.err{color:#f85149}
    #debug-area .dline.inf{color:#58a6ff}

    /* カード */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px}
    .card-title{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .card-title.ac{color:var(--accent)}.card-title.ac3{color:#a78bfa}

    /* フォーム */
    .form-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:14px;align-items:end}
    @media(max-width:860px){.form-row{grid-template-columns:1fr 1fr}}
    @media(max-width:540px){.form-row{grid-template-columns:1fr}}
    .fg{display:flex;flex-direction:column;gap:5px}
    .fg label{font-size:.73rem;color:var(--text-muted);font-weight:500;letter-spacing:.04em}
    input,select{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 13px;font-size:.88rem;font-family:'JetBrains Mono',monospace;outline:none;width:100%;transition:border-color .2s,box-shadow .2s}
    input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1)}

    /* ボタン */
    .btn{padding:9px 22px;border-radius:8px;border:none;font-size:.88rem;font-family:inherit;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
    .btn-p{background:linear-gradient(135deg,var(--accent),#0099cc);color:#000;box-shadow:0 3px 14px rgba(0,212,255,.2)}
    .btn-p:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(0,212,255,.3)}
    .btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .btn-s:hover{border-color:var(--accent)}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
    .btn-row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}

    /* ステップ */
    .step{display:none}.step.show{display:block}

    /* チップ */
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{padding:7px 15px;border-radius:18px;border:1px solid var(--border);background:var(--bg);color:var(--text-muted);font-size:.83rem;cursor:pointer;transition:all .18s;user-select:none}
    .chip:hover{border-color:var(--accent);color:var(--text)}
    .chip.sel-loc{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent);font-weight:600}
    .chip.sel-room{background:rgba(124,58,237,.14);border-color:#a78bfa;color:#c4b5fd;font-weight:600}
    .room-group{margin-bottom:16px}
    .room-group-label{font-size:.72rem;color:var(--text-muted);letter-spacing:.07em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
    .step-actions{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap;align-items:center}
    .step-note{font-size:.75rem;color:var(--text-muted)}

    /* ダッシュボード */
    #dash{display:none}#dash.show{display:block}
    .ctrlbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px}
    .countdown{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
    .cbar{width:72px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
    .cfill{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear}

    /* サマリー */
    .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px}
    .scard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
    .scard-label{font-size:.72rem;color:var(--text-muted);margin-bottom:6px}
    .scard-val{font-size:1.5rem;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
    .scard-sub{font-size:.68rem;color:var(--text-muted);margin-top:4px}
    .v-cy{color:var(--accent)}.v-or{color:var(--accent2)}.v-pu{color:#a78bfa}.v-gr{color:var(--success)}

    /* グラフ */
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px}
    .chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
    .chart-ttl{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:10px}
    .badge{font-size:.68rem;padding:2px 9px;border-radius:9px;font-family:'JetBrains Mono',monospace}
    .b-cy{background:rgba(0,212,255,.13);color:var(--accent)}
    .b-or{background:rgba(255,107,53,.13);color:var(--accent2)}
    .b-pu{background:rgba(124,58,237,.13);color:#a78bfa}

    footer{text-align:center;margin-top:36px;padding-top:18px;border-top:1px solid var(--border);font-size:.72rem;color:var(--text-muted)}
    @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fi{animation:fi .35s ease forwards}
    .debug-toggle{font-size:.72rem;color:var(--text-muted);cursor:pointer;text-decoration:underline;margin-left:8px}
    .debug-toggle:hover{color:var(--text)}
    /* 温度単位トグル */
    .unit-switcher{display:flex;gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden}
    .unit-btn{padding:4px 12px;border:none;background:var(--surface2);color:var(--text-muted);font-size:.75rem;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .18s;white-space:nowrap}
    .unit-btn:first-child{border-right:1px solid var(--border)}
    .unit-btn:hover{color:var(--text)}
    .unit-btn.active{background:rgba(255,107,53,.18);color:var(--accent2);font-weight:700}
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">
        <h1 data-i18n="title"></h1>
        <p data-i18n="subtitle"></p>
      </div>
    </div>
    <div class="hdr-right">
      <!-- 言語切替 -->
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="en"    onclick="setLang('en')">EN</button>
        <button class="lang-btn active" data-lang="ja" onclick="setLang('ja')">日本語</button>
        <button class="lang-btn" data-lang="zh-TW" onclick="setLang('zh-TW')">繁體中文</button>
        <button class="lang-btn" data-lang="zh-CN" onclick="setLang('zh-CN')">简体中文</button>
        <button class="lang-btn" data-lang="ko"    onclick="setLang('ko')">한국어</button>
      </div>
      <!-- 温度単位切替 -->
      <div class="unit-switcher">
        <button class="unit-btn active" id="btn-c" onclick="setUnit('C')">°C</button>
        <button class="unit-btn"        id="btn-f" onclick="setUnit('F')">°F</button>
      </div>
      <div class="status"><div class="dot" id="sdot"></div><span id="stxt"></span></div>
    </div>
  </header>

  <div class="banner">
    <strong data-i18n="bannerTitle"></strong>
    <span data-i18n="bannerBody"></span>
    <div id="pstt" class="pstt waiting" data-i18n="proxyChecking"></div>
  </div>

  <div id="alert-area"></div>
  <div id="debug-area"></div>

  <!-- ステップ1 -->
  <div class="card step show" id="step1">
    <div class="card-title ac">⚙️ <span data-i18n="step1Title"></span></div>
    <div class="form-row">
      <div class="fg">
        <label data-i18n="labelApiKey"></label>
        <input type="password" id="apikey" data-i18n-ph="phApiKey" autocomplete="off">
      </div>
      <div class="fg">
        <label data-i18n="labelOrgId"></label>
        <input type="text" id="orgid" data-i18n-ph="phOrgId" autocomplete="off">
      </div>
      <div class="fg">
        <label data-i18n="labelInterval"></label>
        <select id="interval">
          <option value="180" data-i18n="interval3"></option>
          <option value="300" data-i18n="interval5"></option>
          <option value="600" data-i18n="interval10"></option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-p" id="btn-connect" onclick="connectAPI()" data-i18n="btnConnect"></button>
      </div>
    </div>
  </div>

  <!-- ステップ2 -->
  <div class="card step" id="step2">
    <div class="card-title ac">📍 <span data-i18n="step2Title"></span></div>
    <div class="chips" id="loc-chips"></div>
    <div class="step-actions">
      <button class="btn btn-p" id="btn-to-rooms" onclick="loadRooms()" disabled data-i18n="btnToRooms"></button>
      <button class="btn btn-s" onclick="clrLoc()" data-i18n="btnClear"></button>
    </div>
  </div>

  <!-- ステップ3 -->
  <div class="card step" id="step3">
    <div class="card-title ac3">🚪 <span data-i18n="step3Title"></span></div>
    <div id="room-groups"></div>
    <div class="step-actions">
      <button class="btn btn-p" id="btn-start" onclick="startMonitoring()" disabled data-i18n="btnStart"></button>
      <button class="btn btn-s" onclick="selAllRoom()" data-i18n="btnSelAll"></button>
      <button class="btn btn-s" onclick="clrRoom()" data-i18n="btnClear"></button>
      <button class="btn btn-s" onclick="backToLoc()" data-i18n="btnBack"></button>
      <span class="step-note" id="room-count-note"></span>
    </div>
  </div>

  <!-- ダッシュボード -->
  <div id="dash">
    <div class="ctrlbar">
      <div class="countdown">
        <span data-i18n="nextUpdate"></span>
        <div class="cbar"><div class="cfill" id="cfill" style="width:100%"></div></div>
        <span id="ctxt">--</span>
      </div>
      <div class="btn-row">
        <span style="font-size:.72rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace" id="lupdate"></span>
        <button class="btn btn-s" style="padding:5px 14px;font-size:.8rem" onclick="fetchData()" data-i18n="btnRefresh"></button>
        <button class="btn btn-s" style="padding:5px 14px;font-size:.8rem" onclick="exportCSV()" data-i18n="btnCsv"></button>
        <button class="btn btn-s" style="padding:5px 14px;font-size:.8rem" onclick="stopMonitoring()" data-i18n="btnStop"></button>
        <button class="btn btn-s" style="padding:5px 14px;font-size:.8rem" onclick="resetAll()" data-i18n="btnSettings"></button>
        <span class="debug-toggle" onclick="toggleDebug()" data-i18n="btnLog"></span>
      </div>
    </div>
    <div class="summary" id="summary"></div>
    <div id="room-charts"></div>
  </div>

  <footer>Neat Pulse Sensor Monitor &nbsp;|&nbsp; Neat Pulse API v0.1.1</footer>
</div>

let currentLang = 'ja';

function t(key) {
  return (I18N[currentLang] && I18N[currentLang][key]) || (I18N['en'][key]) || key;
}

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.setAttribute('translate', 'no'); // 自動翻訳を常に無効化

  // ボタンのアクティブ状態（data-lang 属性で確実に照合）
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });

  // data-i18n 属性を持つ要素のテキストを更新
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });

  // placeholder 更新
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPh);
  });

  // select option の text 更新
  document.querySelectorAll('option[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });

  // ステータステキスト（現在の状態を保持しつつ翻訳）
  const dot = $('sdot');
  if (dot.classList.contains('on'))       $('stxt').textContent = t('statusMonitoring');
  else if (dot.classList.contains('err')) $('stxt').textContent = t('statusError');
  else                                    $('stxt').textContent = t('statusDisconnected');

  // プロキシステータス（テキストノード直更新）
  const ps = $('pstt');
  if      (ps.classList.contains('ok'))      ps.textContent = t('proxyOk');
  else if (ps.classList.contains('ng'))      ps.textContent = t('proxyNg');
  else                                       ps.textContent = t('proxyChecking');

  // room-count-note
  updateRoomBtn();

  // ── 動的生成済み要素の翻訳更新 ──────────────────────────

  // サマリーカード（モニタリング中のみ再描画）
  if ($('dash').classList.contains('show') && selectedRooms.length) {
    // 最新のサマリー値を維持しながらラベルだけ再描画
    const sCards = $('summary').querySelectorAll('.scard');
    if (sCards.length === 4) {
      sCards[0].querySelector('.scard-label').textContent = t('sumPeople');
      sCards[0].querySelector('.scard-sub').textContent   = t('sumPeopleSub');
      sCards[1].querySelector('.scard-label').textContent = t('sumTemp');
      sCards[1].querySelector('.scard-sub').textContent   = useFahrenheit ? 'Fahrenheit (°F)' : t('sumTempSub');
      sCards[2].querySelector('.scard-label').textContent = t('sumHumid');
      sCards[2].querySelector('.scard-sub').textContent   = t('sumHumidSub');
      sCards[3].querySelector('.scard-label').textContent = t('sumRooms');
      sCards[3].querySelector('.scard-sub').textContent   = t('sumRoomsSub');
    }

    // グラフカード内のラベルを部屋ごとに更新
    selectedRooms.forEach(room => {
      const rid = String(room.id);
      const lblP = document.getElementById(`lbl-p-${rid}`);
      const lblT = document.getElementById(`lbl-t-${rid}`);
      const lblH = document.getElementById(`lbl-h-${rid}`);
      if (lblP) lblP.textContent = `👥 ${t('people')}`;
      if (lblT) lblT.textContent = `🌡️ ${tempLabel()}`;
      if (lblH) lblH.textContent = `💧 ${t('humidity')}`;

      // グラフ内データセットのラベルも更新
      const ch = roomCharts[rid];
      if (ch) {
        ch.pc.data.datasets[0].label = t('people'); ch.pc.update('none');
        ch.tc.data.datasets[0].label = tempLabel();
        ch.tc.data.datasets[0].data  = sr ? sr.t.map(v=>v!=null?toDisplayTemp(v):null) : [];
        ch.tc.update('none');
        ch.hc.data.datasets[0].label = t('humidity'); ch.hc.update('none');
      }

      // バッジ（最新値）のユニット部分を更新
      const sr = series[rid];
      if (sr) {
        const lastP = sr.p.at(-1), lastT = sr.t.at(-1), lastH = sr.h.at(-1);
        const vp = document.getElementById(`val-p-${rid}`);
        const vt = document.getElementById(`val-t-${rid}`);
        const vh = document.getElementById(`val-h-${rid}`);
        if (vp) vp.textContent = `👥 ${lastP != null ? lastP + t('unit_people') : '--'}`;
        if (vt) vt.textContent = `🌡️ ${lastT != null ? toDisplayTemp(lastT)+tempUnit() : '--'}`;
        if (vh) vh.textContent = `💧 ${lastH != null ? lastH.toFixed(1) + '%' : '--'}`;
      }
    });

    // カウントダウン表示
    $('ctxt').textContent = `${secsLeft} ${t('sec')}`;
  }
}

// 摂氏 → 表示用温度（単位に応じて変換）
function toDisplayTemp(celsius) {
  if (celsius === null || celsius === undefined) return null;
  return useFahrenheit ? +(celsius * 9/5 + 32).toFixed(1) : +celsius.toFixed(1);
}
// 表示用の単位文字列
function tempUnit() { return useFahrenheit ? '°F' : '°C'; }
// グラフ用ラベル（単位付き）
function tempLabel() {
  const base = t('temperature'); // 例: "温度 (°C)"
  return base.replace(/\(.*?\)/, `(${tempUnit()})`);
}

// 温度単位切替
function setUnit(unit) {
  useFahrenheit = (unit === 'F');
  document.getElementById('btn-c').classList.toggle('active', !useFahrenheit);
  document.getElementById('btn-f').classList.toggle('active',  useFahrenheit);
  // モニタリング中なら表示を即時更新
  if ($('dash').classList.contains('show') && selectedRooms.length) {
    refreshTempDisplay();
  }
}

// 温度表示だけ再描画（データ再取得なし）
function refreshTempDisplay() {
  let sumT=0, cntT=0;
  selectedRooms.forEach(room => {
    const rid = String(room.id);
    const sr  = series[rid];
    const ch  = roomCharts[rid];
    if (!sr || !ch) return;
    // バッジ更新
    const lastT = sr.t.at(-1);
    const vt = document.getElementById(`val-t-${rid}`);
    if (vt) vt.textContent = `🌡️ ${lastT!=null ? toDisplayTemp(lastT)+tempUnit() : '--'}`;
    // ラベル更新
    const lblT = document.getElementById(`lbl-t-${rid}`);
    if (lblT) lblT.textContent = `🌡️ ${tempLabel()}`;
    // グラフデータを変換して更新
    ch.tc.data.datasets[0].label = tempLabel();
    ch.tc.data.datasets[0].data  = sr.t.map(v => v!=null ? toDisplayTemp(v) : null);
    ch.tc.update('none');
    // サマリー用集計
    if (lastT != null) { sumT += lastT; cntT++; }
  });
  // サマリーの平均温度更新
  const avgT = cntT ? sumT/cntT : null;
  const stCard = $('summary').querySelectorAll('.scard')[1];
  if (stCard) {
    stCard.querySelector('.scard-val').textContent = avgT!=null ? toDisplayTemp(avgT)+tempUnit() : '--';
    stCard.querySelector('.scard-label').textContent = t('sumTemp');
    stCard.querySelector('.scard-sub').textContent =
      useFahrenheit ? 'Fahrenheit (°F)' : t('sumTempSub');
  }
}

const $ = id => document.getElementById(id);

function showAlert(msg, type = 'inf') {
  const icon = { err:'❌', ok:'✅', inf:'ℹ️' }[type] || 'ℹ️';
  $('alert-area').innerHTML = `<div class="alert a-${type} fi">${icon} ${msg}</div>`;
  if (type !== 'err') setTimeout(() => { $('alert-area').innerHTML = ''; }, 5500);
}

function setSt(state, textKey) {
  $('sdot').className = 'dot' + (state==='on'?' on':state==='err'?' err':'');
  $('stxt').textContent = t(textKey);
}

function showStep(n) {
  document.querySelectorAll('.step').forEach(el => el.classList.remove('show'));
  if (n) $('step'+n).classList.add('show');
}

/* デバッグ */
let debugVisible = false;
function toggleDebug() { debugVisible = !debugVisible; $('debug-area').classList.toggle('show', debugVisible); }
function dbg(msg, type='inf') {
  const el = $('debug-area');
  const line = document.createElement('div');
  line.className = 'dline '+type;
  line.textContent = new Date().toLocaleTimeString() + '  ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function apiFetch(path) {
  dbg(`GET ${path}`);
  const r = await fetch(`${PROXY}/proxy?path=${encodeURIComponent(path)}`, {
    headers: { 'Authorization': `Bearer ${apiKey}`, 'Accept': 'application/json' }
  });
  const text = await r.text();
  if (!r.ok) { dbg(`ERROR ${r.status}: ${text.slice(0,120)}`, 'err'); throw new Error(`HTTP ${r.status}: ${text.slice(0,200)}`); }
  dbg(`  → ${r.status} (${text.length} bytes)`, 'ok');
  try { return JSON.parse(text); } catch(e) { throw new Error('JSON parse error: '+text.slice(0,100)); }
}

function extractList(data, ...keys) {
  if (Array.isArray(data)) return data;
  for (const k of keys) {
    if (data[k] != null) { const v = data[k]; return Array.isArray(v) ? v : Object.values(v); }
  }
  const found = Object.values(data).find(v => Array.isArray(v) && v.length > 0 && typeof v[0]==='object');
  return found || [];
}

async function checkProxy() {
  const el = $('pstt');
  try {
    await fetch(`${PROXY}/proxy?path=/v1/`, { signal: AbortSignal.timeout(3000) });
    el.className = 'pstt ok';
    el.textContent = t('proxyOk');
  } catch {
    el.className = 'pstt ng';
    el.textContent = t('proxyNg');
  }
}

/* ============================================================
   ステップ1: API接続
   ============================================================ */
async function connectAPI() {
  apiKey = $('apikey').value.trim();
  orgId  = $('orgid').value.trim();
  if (!apiKey||!orgId) { showAlert(t('errApiKey'), 'err'); return; }

  const btn = $('btn-connect');
  btn.disabled = true; btn.textContent = '...';
  try {
    const data = await apiFetch(`/v1/orgs/${orgId}/locations`);
    allLocations = extractList(data, 'locations', 'items');
    if (!allLocations.length) { showAlert(t('errNoLoc'), 'err'); return; }
    renderLocChips();
    showStep(2);
    setSt('on', 'statusConnected');
    showAlert(`${allLocations.length} ${t('okLocations')}`, 'ok');
  } catch(e) {
    setSt('err', 'statusError');
    const msg = (e.message.includes('fetch')||e.message.includes('Network'))
      ? t('errProxy') : t('errConnect') + e.message;
    showAlert(msg, 'err');
  } finally { btn.disabled = false; btn.textContent = t('btnConnect'); }
}

/* ============================================================
   ステップ2: ロケーション選択
   ============================================================ */
function renderLocChips() {
  const g = $('loc-chips'); g.innerHTML = '';
  selectedLocIds = [];
  allLocations.forEach(loc => {
    const c = document.createElement('div');
    c.className = 'chip'; c.textContent = loc.name||String(loc.id); c.dataset.id = String(loc.id);
    c.onclick = () => toggleLoc(c, String(loc.id));
    g.appendChild(c);
  });
  updateLocBtn();
}

function toggleLoc(chip, id) {
  const on = chip.classList.toggle('sel-loc');
  selectedLocIds = on
    ? [...selectedLocIds, id]
    : selectedLocIds.filter(x => x !== id);
  updateLocBtn();
}
function updateLocBtn() { $('btn-to-rooms').disabled = selectedLocIds.length === 0; }
function clrLoc() {
  document.querySelectorAll('#loc-chips .chip').forEach(c => c.classList.remove('sel-loc'));
  selectedLocIds = []; updateLocBtn();
}

/* ============================================================
   ステップ3: 部屋選択
   ============================================================ */
async function loadRooms() {
  if (!selectedLocIds.length) return;
  const btn = $('btn-to-rooms');
  btn.disabled = true; btn.textContent = '...';
  showAlert(t('fetchingRooms'), 'inf');
  roomsForLoc = []; selectedRoomIds = [];

  try {
    // 全部屋を1回だけ取得
    const roomData = await apiFetch(`/v1/orgs/${orgId}/rooms`);
    const allRoomsList = extractList(roomData, 'rooms', 'items');
    dbg(`total rooms: ${allRoomsList.length}`);

    // 選択した各ロケーションに対してエンドポイントAPIでroomIdを収集
    for (const locId of selectedLocIds) {
      const locName = (allLocations.find(l=>String(l.id)===locId)||{}).name||locId;

      const epData = await apiFetch(`/v1/orgs/${orgId}/endpoints?locationId=${locId}`);
      const epList = extractList(epData, 'endpoints', 'items');
      dbg(`[${locName}] endpoints: ${epList.length}`);

      const roomIdSet = new Set();
      epList.forEach(ep => {
        const rid = ep.roomId ?? ep.room_id ?? ep.RoomId ?? ep.roomID ?? null;
        if (rid != null) roomIdSet.add(String(rid));
      });
      dbg(`[${locName}] roomIds: [${[...roomIdSet].join(',')}]`, roomIdSet.size?'ok':'err');

      if (roomIdSet.size > 0) {
        allRoomsList.forEach(r => {
          // 重複追加を防止
          if (roomIdSet.has(String(r.id)) && !roomsForLoc.find(x=>String(x.id)===String(r.id))) {
            r._locId=locId; r._locName=locName; roomsForLoc.push(r);
          }
        });
      } else {
        // roomId なし → エンドポイント自体を部屋として扱う
        epList.forEach(ep => {
          if (!roomsForLoc.find(x=>String(x.id)===String(ep.id))) {
            roomsForLoc.push({ id:ep.id, name:ep.name||ep.roomName||String(ep.id), _locId:locId, _locName:locName, _isEndpoint:true });
          }
        });
      }
    }

    dbg(`filtered rooms total: ${roomsForLoc.length}`, roomsForLoc.length?'ok':'err');
    if (!roomsForLoc.length) { showAlert(t('errNoRooms'), 'err'); return; }
    renderRoomGroups(); showStep(3); $('alert-area').innerHTML='';
  } catch(e) {
    showAlert(t('errFetchRooms')+e.message, 'err');
  } finally { btn.disabled=false; btn.textContent=t('btnToRooms'); }
}

function renderRoomGroups() {
  const wrap = $('room-groups'); wrap.innerHTML=''; selectedRoomIds=[];

  // ロケーション別にグループ化
  const byLoc = {};
  roomsForLoc.forEach(r => {
    const key = r._locId || 'unknown';
    if (!byLoc[key]) byLoc[key] = { name: r._locName || key, rooms: [] };
    byLoc[key].rooms.push(r);
  });

  Object.entries(byLoc).forEach(([locId, {name: locName, rooms}]) => {
    const group = document.createElement('div'); group.className='room-group';
    const lbl = document.createElement('div'); lbl.className='room-group-label';
    lbl.innerHTML=`📍 ${locName} <span style="color:var(--text-muted);font-weight:400">(${rooms.length})</span>`;
    group.appendChild(lbl);
    const chipsDiv = document.createElement('div'); chipsDiv.className='chips';
    rooms.forEach(r => {
      const c = document.createElement('div');
      c.className='chip'; c.textContent=r.name||String(r.id); c.dataset.id=String(r.id);
      c.onclick=()=>toggleRoomChip(c, String(r.id));
      chipsDiv.appendChild(c);
    });
    group.appendChild(chipsDiv); wrap.appendChild(group);
  });

  // room-chips IDは selAllRoom/clrRoom のために全チップ対象にする
  updateRoomBtn();
}

function toggleRoomChip(chip, id) {
  const on = chip.classList.toggle('sel-room');
  selectedRoomIds = on ? [...selectedRoomIds,id] : selectedRoomIds.filter(x=>x!==id);
  updateRoomBtn();
}
function updateRoomBtn() {
  const n = selectedRoomIds.length;
  $('btn-start').disabled = n===0;
  $('room-count-note').textContent = n ? `${n} ${t('roomSelected')}` : '';
}
function selAllRoom() {
  document.querySelectorAll('#room-groups .chip').forEach(c => {
    c.classList.add('sel-room');
    if (!selectedRoomIds.includes(c.dataset.id)) selectedRoomIds.push(c.dataset.id);
  }); updateRoomBtn();
}
function clrRoom() { document.querySelectorAll('#room-groups .chip').forEach(c=>c.classList.remove('sel-room')); selectedRoomIds=[]; updateRoomBtn(); }
function backToLoc() { showStep(2); $('alert-area').innerHTML=''; }

/* ============================================================
   モニタリング
   ============================================================ */
function startMonitoring() {
  selectedRooms = roomsForLoc.filter(r=>selectedRoomIds.includes(String(r.id)));
  if (!selectedRooms.length) { showAlert(t('errSelectRoom'),'err'); return; }
  intSec = parseInt($('interval').value);
  tlabels=[]; series={};
  selectedRooms.forEach(r => { series[String(r.id)]={name:r.name||String(r.id),p:[],t:[],h:[]}; });
  initCharts(); showStep(null); $('dash').classList.add('show');
  setSt('on','statusMonitoring'); fetchData(); startTimer();
  showAlert(`${selectedRooms.length} ${t('okStarted')} ${intSec/60} ${t('mins')}`, 'ok');
}

function stopMonitoring() {
  clearInterval(monTimer); clearInterval(cdTimer); monTimer=null;
  setSt('on','statusStopped'); showAlert(t('okStopped'),'inf');
}

function resetAll() {
  stopMonitoring(); $('dash').classList.remove('show');
  tlabels=[]; series={};
  Object.values(roomCharts).forEach(c=>{c.pc.destroy();c.tc.destroy();c.hc.destroy();});
  Object.keys(roomCharts).forEach(k=>delete roomCharts[k]);
  $('room-charts').innerHTML=''; showStep(1); setSt('','statusDisconnected');
}

/* ============================================================
   タイマー
   ============================================================ */
function startTimer() {
  if (!selectedRooms.length) return;
  clearInterval(monTimer); clearInterval(cdTimer);
  secsLeft=intSec; updateCD();
  cdTimer  = setInterval(()=>{ secsLeft--; if(secsLeft<0)secsLeft=intSec; updateCD(); },1000);
  monTimer = setInterval(fetchData, intSec*1000);
}
function updateCD() {
  $('ctxt').textContent = `${secsLeft} ${t('sec')}`;
  $('cfill').style.width = (secsLeft/intSec*100)+'%';
}

/* ============================================================
   センサーデータ
   ============================================================ */
function parseSample(raw) {
  dbg(`  raw keys: ${Object.keys(raw).join(', ')}`);
  let s = Array.isArray(raw) ? raw[0] : raw;
  for (let depth=0; depth<3; depth++) {
    if (!s||typeof s!=='object') break;
    if (hasMetric(s)) break;
    let found=false;
    for (const k of ['roomData','sensorData','sensor_data','samples','data','result','payload']) {
      if (s[k]!=null) { dbg(`  depth${depth}: "${k}"`); s=Array.isArray(s[k])?s[k][0]:s[k]; found=true; break; }
    }
    if (!found) break;
  }
  if (!s||typeof s!=='object') return null;
  dbg(`  final keys: ${Object.keys(s).join(', ')}`);
  dbg(`  values: ${Object.entries(s).map(([k,v])=>`${k}=${JSON.stringify(v)}`).join(' | ')}`);
  let p = s.people??s.peopleCount??s.people_count??s.PeopleCount??s.personCount??s.persons??s.occupancy??null;
  let t2= s.temperature??s.Temperature??s.temp??s.ambientTemp??s.AmbientTemp??null;
  let h = s.humidity??s.Humidity??s.relativeHumidity??s.RelativeHumidity??s.rh??null;
  if (t2!==null&&t2>200) t2=+(t2-273.15).toFixed(2);
  return {p,t:t2,h};
}
function hasMetric(s) {
  return s.people!=null||s.peopleCount!=null||s.people_count!=null||s.PeopleCount!=null||
         s.personCount!=null||s.persons!=null||s.occupancy!=null||
         s.temperature!=null||s.Temperature!=null||s.temp!=null||s.ambientTemp!=null||
         s.humidity!=null||s.Humidity!=null||s.relativeHumidity!=null||s.rh!=null;
}

async function fetchData() {
  if (!selectedRooms.length) return;
  setSt('on','statusFetching');
  const now=new Date();
  const label=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  tlabels.push(label); if(tlabels.length>MAX_PTS) tlabels.shift();

  let sumP=0,sumT=0,cntT=0,sumH=0,cntH=0,active=0;
  for (const room of selectedRooms) {
    const rid=String(room.id); let p=null,t2=null,h=null;
    try {
      const path = room._isEndpoint
        ? `/v1/orgs/${orgId}/endpoints/${room.id}/sensor`
        : `/v1/orgs/${orgId}/rooms/${room.id}/sensor`;
      const data=await apiFetch(path);
      const parsed=parseSample(data);
      if (parsed) {
        p=parsed.p; t2=parsed.t; h=parsed.h; active++;
        if(p!=null)sumP+=p; if(t2!=null){sumT+=t2;cntT++;} if(h!=null){sumH+=h;cntH++;}
        dbg(`  [${room.name}] p=${p} t=${t2} h=${h}`, 'ok');
      }
    } catch(e) { dbg(`  [${room.name}] failed: ${e.message}`,'err'); }
    const sr=series[rid]; sr.p.push(p);sr.t.push(t2);sr.h.push(h);
    if(sr.p.length>MAX_PTS){sr.p.shift();sr.t.shift();sr.h.shift();}
  }
  renderSummary(sumP, cntT?sumT/cntT:null, cntH?sumH/cntH:null, active);
  updateCharts();
  $('lupdate').textContent=`${t('lastUpdate')} ${now.toLocaleString()}`;
  setSt('on','statusMonitoring'); secsLeft=intSec;
}

/* ============================================================
   サマリー
   ============================================================ */
function renderSummary(sumP, avgT, avgH, active) {
  $('summary').innerHTML=`
    <div class="scard"><div class="scard-label">${t('sumPeople')}</div><div class="scard-val v-cy">${sumP}</div><div class="scard-sub">${t('sumPeopleSub')}</div></div>
    <div class="scard"><div class="scard-label">${t('sumTemp')}</div><div class="scard-val v-or">${avgT!==null?toDisplayTemp(avgT)+tempUnit():'--'}</div><div class="scard-sub">${useFahrenheit?'Fahrenheit (°F)':t('sumTempSub')}</div></div>
    <div class="scard"><div class="scard-label">${t('sumHumid')}</div><div class="scard-val v-pu">${avgH!==null?avgH.toFixed(1)+'%':'--'}</div><div class="scard-sub">${t('sumHumidSub')}</div></div>
    <div class="scard"><div class="scard-label">${t('sumRooms')}</div><div class="scard-val v-gr">${active} / ${selectedRooms.length}</div><div class="scard-sub">${t('sumRoomsSub')}</div></div>
  `;
}

/* ============================================================
   グラフ（部屋ごと個別）
   ============================================================ */
function baseOpts(extra={}) {
  return {
    responsive:true, maintainAspectRatio:false, animation:{duration:300},
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{backgroundColor:'#1a2234',titleColor:'#e2e8f0',bodyColor:'#94a3b8',borderColor:'#1e2d45',borderWidth:1,
        callbacks:{label:item=>` ${item.dataset.label}: ${item.raw??'--'}`}}
    },
    scales:{
      x:{ticks:{color:'#64748b',font:{family:'JetBrains Mono',size:10},maxTicksLimit:10,maxRotation:0},grid:{color:'#1e2d45'}},
      y:{...extra, ticks:{color:'#64748b',font:{family:'JetBrains Mono',size:10},...(extra.ticks||{})},grid:{color:'#1e2d45'}}
    }
  };
}
function makeLine(color,label) {
  return {data:[],label,borderColor:color,backgroundColor:color+'22',borderWidth:2.5,pointRadius:3,pointHoverRadius:6,tension:.4,fill:false,spanGaps:true};
}

function initCharts() {
  Object.values(roomCharts).forEach(c=>{c.pc.destroy();c.tc.destroy();c.hc.destroy();});
  Object.keys(roomCharts).forEach(k=>delete roomCharts[k]);
  const wrap=$('room-charts'); wrap.innerHTML='';

  selectedRooms.forEach((room,i)=>{
    const rid=String(room.id), color=COLORS[i%COLORS.length], name=room.name||rid;
    const card=document.createElement('div'); card.className='chart-card';
    card.innerHTML=`
      <div class="chart-hdr">
        <div class="chart-ttl">
          <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${color};flex-shrink:0"></span>
          ${name}
        </div>
        <div style="display:flex;gap:8px;font-size:.7rem;font-family:'JetBrains Mono',monospace">
          <span class="badge b-cy" id="val-p-${rid}">👥 --</span>
          <span class="badge b-or" id="val-t-${rid}">🌡️ --</span>
          <span class="badge b-pu" id="val-h-${rid}">💧 --</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
        <div><div style="font-size:.7rem;color:var(--text-muted);margin-bottom:6px" id="lbl-p-${rid}"></div><div style="position:relative;height:160px"><canvas id="c-p-${rid}"></canvas></div></div>
        <div><div style="font-size:.7rem;color:var(--text-muted);margin-bottom:6px" id="lbl-t-${rid}"></div><div style="position:relative;height:160px"><canvas id="c-t-${rid}"></canvas></div></div>
        <div><div style="font-size:.7rem;color:var(--text-muted);margin-bottom:6px" id="lbl-h-${rid}"></div><div style="position:relative;height:160px"><canvas id="c-h-${rid}"></canvas></div></div>
      </div>`;
    wrap.appendChild(card);

    // ラベルを言語に合わせてセット
    document.getElementById(`lbl-p-${rid}`).textContent = `👥 ${t('people')}`;
    document.getElementById(`lbl-t-${rid}`).textContent = `🌡️ ${tempLabel()}`;
    document.getElementById(`lbl-h-${rid}`).textContent = `💧 ${t('humidity')}`;

    const pc=new Chart(document.getElementById(`c-p-${rid}`),{type:'line',data:{labels:[],datasets:[makeLine(color,t('people'))]},options:baseOpts({min:0,ticks:{stepSize:1}})});
    const tc=new Chart(document.getElementById(`c-t-${rid}`),{type:'line',data:{labels:[],datasets:[makeLine('#ff6b35',tempLabel())]},options:baseOpts()});
    const hc=new Chart(document.getElementById(`c-h-${rid}`),{type:'line',data:{labels:[],datasets:[makeLine('#a78bfa',t('humidity'))]},options:baseOpts({min:0,max:100})});
    roomCharts[rid]={pc,tc,hc};
  });
}

function updateCharts() {
  const labels=[...tlabels];
  selectedRooms.forEach(room=>{
    const rid=String(room.id), sr=series[rid], ch=roomCharts[rid];
    if(!sr||!ch) return;
    const lastP=sr.p.at(-1), lastT=sr.t.at(-1), lastH=sr.h.at(-1);
    const vp=document.getElementById(`val-p-${rid}`);
    const vt=document.getElementById(`val-t-${rid}`);
    const vh=document.getElementById(`val-h-${rid}`);
    if(vp) vp.textContent=`👥 ${lastP!=null?lastP+t('unit_people'):'--'}`;
    if(vt) vt.textContent=`🌡️ ${lastT!=null?toDisplayTemp(lastT)+tempUnit():'--'}`;
    if(vh) vh.textContent=`💧 ${lastH!=null?lastH.toFixed(1)+'%':'--'}`;
    ch.pc.data.labels=labels; ch.pc.data.datasets[0].data=[...sr.p]; ch.pc.update('none');
    ch.tc.data.labels=labels; ch.tc.data.datasets[0].data=sr.t.map(v=>v!=null?toDisplayTemp(v):null); ch.tc.update('none');
    ch.hc.data.labels=labels; ch.hc.data.datasets[0].data=[...sr.h]; ch.hc.update('none');
  });
}

/* ============================================================
   CSV出力
   ============================================================ */
function exportCSV() {
  if (!selectedRooms.length || !tlabels.length) {
    showAlert(t('errSelectRoom'), 'err'); return;
  }

  // ヘッダー行：timestamp, 部屋名×指標
  const tempUnitStr = tempUnit();  // °C or °F
  const headers = ['Timestamp'];
  selectedRooms.forEach(room => {
    const name = room.name || String(room.id);
    headers.push(`${name} - ${t('people')}`);
    headers.push(`${name} - Temperature (${tempUnitStr})`);
    headers.push(`${name} - Humidity (%)`);
  });

  // データ行：各タイムスタンプごとに全部屋の値を並べる
  const rows = tlabels.map((label, i) => {
    const row = [label];
    selectedRooms.forEach(room => {
      const sr = series[String(room.id)];
      if (sr) {
        const p = sr.p[i] ?? '';
        const tRaw = sr.t[i];
        const tVal = tRaw != null ? toDisplayTemp(tRaw) : '';
        const h = sr.h[i] ?? '';
        row.push(p, tVal, h);
      } else {
        row.push('', '', '');
      }
    });
    return row;
  });

  // CSV文字列生成（値にカンマや改行が含まれる場合はダブルクォートで囲む）
  const escape = v => {
    const s = String(v);
    return (s.includes(',') || s.includes('"') || s.includes('\n'))
      ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const csvLines = [headers, ...rows].map(row => row.map(escape).join(','));
  const csvContent = '\uFEFF' + csvLines.join('\r\n'); // BOM付きでExcel対応

  // ファイル名：neat-pulse_YYYYMMDD_HHMMSS.csv
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  const filename = `neat-pulse_${ts}.csv`;

  // ダウンロード実行
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showAlert(`${t('csvDownloaded')}  📄 ${filename}`, 'ok');
}

   初期化

document.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!$('btn-connect').disabled) connectAPI(); });
window.addEventListener('load', ()=>{
  setLang('ja');  // デフォルト日本語
  setTimeout(checkProxy, 600);
});
